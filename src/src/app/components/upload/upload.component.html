<div class="flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-md border border-gray-100 max-w-2xl mx-auto mt-12">
    <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">上傳交易明細或傳票檔案</h2>
    <p class="text-gray-500 mb-6 text-center">請上傳包含交易紀錄的 Excel (.xlsx) 或 CSV 檔案。<br>檔案處理完畢後不會儲存於本機，確保您的資料安全無虞。</p>

    <label class="cursor-pointer bg-primary text-white px-6 py-3 rounded-xl hover:bg-primary/90 transition-colors shadow-sm font-medium">
        選擇檔案
        <input type="file" class="hidden" (change)="onFileSelected($event)" accept=".csv,.xlsx,.xls">
    </label>

    <div *ngIf="errorMessage" class="mt-4 text-danger bg-danger/10 px-4 py-2 rounded-lg text-sm">
        {{ errorMessage }}
    </div>
</div>
